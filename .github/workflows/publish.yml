name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # triggers on v0.1.0, v1.2.3, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # optional: add approval gate in GitHub settings
    permissions:
      id-token: write          # required for trusted publishing (no token needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no PYPI_TOKEN secret needed.
        # One-time setup: go to pypi.org → your project → Publishing → add
        # this repo/workflow as a trusted publisher.
